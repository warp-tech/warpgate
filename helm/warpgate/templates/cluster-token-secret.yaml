{{/*
Shared secret authenticating cross-node recording proxying (WARPGATE_CLUSTER_TOKEN).
Reuses the existing secret's value on upgrade (or one pre-created by the user);
generates a random token otherwise. `lookup` returns nothing during
`helm template`/dry-run, so a fresh token is rendered there — harmless, as the
real value is settled at install time.
*/}}
{{- $secretName := printf "%s-cluster-token" (include "warpgate.fullname" .) }}
{{- $token := randAlphaNum 32 | b64enc }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if and $existing $existing.data (index $existing.data "clusterToken") }}
{{- $token = index $existing.data "clusterToken" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "warpgate.labels" . | nindent 4 }}
type: Opaque
data:
  clusterToken: {{ $token }}
