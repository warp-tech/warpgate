[package]
name = "warpgate"
version = "0.25.5"
edition = "2024"
license = "Apache-2.0"
publish = false

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
bytes.workspace = true
clap = { version = "4.0", features = [
    "derive",
    "env",
], default-features = false }
config = { version = "0.15", features = ["yaml"], default-features = false }
console = { version = "0.16", default-features = false }
console-subscriber = { version = "0.5", optional = true, default-features = false }
data-encoding.workspace = true
dialoguer.workspace = true
enum_dispatch.workspace = true
futures.workspace = true
notify = { version = "8.0", default-features = false, features = [
    "fsevent-sys",
] }
rcgen.workspace = true
reqwest = { workspace = true, features = ["json"] }
rustls.workspace = true
schemars.workspace = true
sea-orm.workspace = true
serde_json.workspace = true
serde_yaml = { version = "0.9", default-features = false }
time = { version = "0.3", default-features = false }
tokio.workspace = true
tracing.workspace = true
tracing-log = { version = "0.2", default-features = false, features = [
    "log-tracer",
    "std",
] }
tracing-subscriber = { version = "0.3", features = [
    "ansi",
    "env-filter",
    "local-time",
], default-features = false }
uuid = { version = "1.23", default-features = false }
warpgate-admin = { path = "../warpgate-admin" }
warpgate-ca = { path = "../warpgate-ca" }
warpgate-common = { path = "../warpgate-common" }
warpgate-core = { path = "../warpgate-core" }
warpgate-db-entities = { path = "../warpgate-db-entities" }
warpgate-protocol-http = { path = "../warpgate-protocol-http" }
warpgate-protocol-kubernetes = { path = "../warpgate-protocol-kubernetes" }
warpgate-protocol-mysql = { path = "../warpgate-protocol-mysql" }
warpgate-protocol-postgres = { path = "../warpgate-protocol-postgres" }
warpgate-protocol-ssh = { path = "../warpgate-protocol-ssh" }
warpgate-protocol-vnc = { path = "../warpgate-protocol-vnc" }
warpgate-tls = { path = "../warpgate-tls" }

[features]
default = ["sqlite"]
tokio-console = ["dep:console-subscriber", "tokio/tracing"]
postgres = ["warpgate-core/postgres"]
mysql = ["warpgate-core/mysql"]
sqlite = ["warpgate-core/sqlite"]

[target.'cfg(target_os = "linux")'.dependencies]
sd-notify = { version = "0.5", default-features = false }
