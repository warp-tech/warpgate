[package]
name = "warpgate-rdp-helper"
version = "0.23.4"
edition = "2021"
license = "Apache-2.0"
publish = false
description = "Standalone RDP client helper for Warpgate, isolated from the workspace lockfile because IronRDP's CredSSP/RustCrypto pre-release pins conflict with russh's."

[dependencies]
anyhow = "1.0"
base64 = "0.22"
ironrdp = { version = "0.14.0", features = ["connector", "session", "graphics", "input"] }
ironrdp-blocking = "0.8.0"
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
rustls-native-certs = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sspi = { version = "=0.18.7", features = ["network_client"] }
x509-cert = { version = "0.2", default-features = false, features = ["std"] }
