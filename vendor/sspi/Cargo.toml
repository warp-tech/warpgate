[package]
edition = "2024"
rust-version = "1.89"
name = "sspi"
version = "0.21.3"
authors = ["Devolutions Inc. <infos@devolutions.net>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A Rust implementation of the Security Support Provider Interface (SSPI) API"
homepage = "https://github.com/devolutions/sspi-rs"
readme = "README.md"
keywords = [
    "ntlm",
    "auth",
    "sspi",
    "windows",
    "kerberos",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/devolutions/sspi-rs"
resolver = "2"

[features]
__install-crypto-provider = []
__rustls-used = ["dep:rustls"]
__test-data = []
aws-lc-rs = [
    "rustls?/aws-lc-rs",
    "__install-crypto-provider",
]
default = ["aws-lc-rs"]
dns_resolver = [
    "dep:hickory-resolver",
    "dep:hickory-proto",
    "dep:tokio",
]
network_client = [
    "dep:reqwest",
    "dep:portpicker",
    "dep:rustls-native-certs",
    "__rustls-used",
]
ring = [
    "rustls?/ring",
    "reqwest?/rustls-tls-native-roots",
    "__install-crypto-provider",
]
scard = [
    "dep:winscard",
    "dep:cryptoki",
]
tsssp = [
    "dep:rustls",
    "__rustls-used",
]

[lib]
name = "sspi"
path = "src/lib.rs"

[[example]]
name = "client"
path = "examples/client.rs"

[[example]]
name = "kerberos"
path = "examples/kerberos.rs"
required-features = ["network_client"]

[[example]]
name = "server"
path = "examples/server.rs"

[[test]]
name = "sspi"
path = "tests/sspi/main.rs"

