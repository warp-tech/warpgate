[package]
name = "warpgate-sso"
version = "0.26.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[dependencies]
bytes.workspace = true
data-encoding.workspace = true
futures.workspace = true
jsonwebtoken = { version = "10", default-features = false, features = [
    "use_pem",
    "aws_lc_rs",
] }
openidconnect = { version = "4.0", default-features = false, features = [
    "reqwest",
    "accept-string-booleans",
] }
reqwest_12 = { workspace = true, features = ["json"] }
schemars.workspace = true
serde.workspace = true
serde_json.workspace = true
subtle.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
yup-oauth2 = { version = "12", default-features = false, features = [
    "service-account",
    "hyper-rustls",
    "ring",
] }
