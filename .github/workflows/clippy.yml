name: Clippy

on: [pull_request]
permissions:
  contents: read

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Install deps
        run: |
          rustup component add clippy
          cargo install --locked just@1.4.0
          cargo install --locked cargo-cranky@0.3.0

      # Built first so warpgate-protocol-rdp's embedded-helper code paths are linted.
      - name: Build RDP helper
        run: just build-rdp-helper

      - name: Build RDP server helper
        run: just build-rdp-server-helper

      - name: Clippy
        run: |
          just clippy
