name: Database Migration Test

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test-postgres:
    name: Test migrations (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: warpgate
          POSTGRES_PASSWORD: warpgate
          POSTGRES_DB: warpgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U warpgate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          key: "db-migration-test"

      - name: Install just
        run: cargo install --locked just

      - name: Build UI
        run: |
          just npm ci
          just npm run build

      - name: Build warpgate
        run: cargo build --all-features

      - name: Run unattended-setup with PostgreSQL
        run: |
          ./target/debug/warpgate \
            --config "${{ runner.temp }}/warpgate-pg.yaml" \
            --skip-securing-files \
            unattended-setup \
            --database-url "postgres://warpgate:warpgate@localhost:5432/warpgate" \
            --data-path "${{ runner.temp }}/wg-pg-data" \
            --http-port 18443 \
            --record-sessions \
            --admin-password test-admin-password

      - name: Start warpgate and check API info endpoint
        run: |
          ./target/debug/warpgate \
            --config "${{ runner.temp }}/warpgate-pg.yaml" \
            --skip-securing-files \
            run &
          WG_PID=$!

          # Wait for warpgate to start (up to 30 seconds)
          for i in $(seq 1 30); do
            if curl -sk https://localhost:18443/@warpgate/api/info; then
              echo ""
              echo "Warpgate API is up!"
              break
            fi
            if ! kill -0 $WG_PID 2>/dev/null; then
              echo "Warpgate process exited unexpectedly"
              exit 1
            fi
            sleep 1
          done

          # Verify the info endpoint returns 200
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:18443/@warpgate/api/info)
          echo "HTTP status: $HTTP_STATUS"

          kill $WG_PID || true
          wait $WG_PID 2>/dev/null || true

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Expected HTTP 200, got $HTTP_STATUS"
            exit 1
          fi

  test-mysql:
    name: Test migrations (MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: warpgate
          MYSQL_USER: warpgate
          MYSQL_PASSWORD: warpgate
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          key: "db-migration-test"

      - name: Install just
        run: cargo install --locked just

      - name: Build UI
        run: |
          just npm ci
          just npm run build

      - name: Build warpgate
        run: cargo build --all-features

      - name: Run unattended-setup with MySQL
        run: |
          ./target/debug/warpgate \
            --config "${{ runner.temp }}/warpgate-mysql.yaml" \
            --skip-securing-files \
            unattended-setup \
            --database-url "mysql://warpgate:warpgate@localhost:3306/warpgate" \
            --data-path "${{ runner.temp }}/wg-mysql-data" \
            --http-port 18443 \
            --record-sessions \
            --admin-password test-admin-password

      - name: Start warpgate and check API info endpoint
        run: |
          ./target/debug/warpgate \
            --config "${{ runner.temp }}/warpgate-mysql.yaml" \
            --skip-securing-files \
            run &
          WG_PID=$!

          # Wait for warpgate to start (up to 30 seconds)
          for i in $(seq 1 30); do
            if curl -sk https://localhost:18443/@warpgate/api/info; then
              echo ""
              echo "Warpgate API is up!"
              break
            fi
            if ! kill -0 $WG_PID 2>/dev/null; then
              echo "Warpgate process exited unexpectedly"
              exit 1
            fi
            sleep 1
          done

          # Verify the info endpoint returns 200
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:18443/@warpgate/api/info)
          echo "HTTP status: $HTTP_STATUS"

          kill $WG_PID || true
          wait $WG_PID 2>/dev/null || true

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Expected HTTP 200, got $HTTP_STATUS"
            exit 1
          fi
