name: Cargo Deny
permissions:
  contents: read

on: [push, pull_request]

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny@0.18.9

      - name: cargo-deny check
        run: |
          cargo deny --version
          cargo deny check
          # The RDP helpers have their own lockfiles (IronRDP/sspi etc.) that ship
          # embedded in the main binary; scan them with the same policy. The config
          # path must be absolute — a relative --config resolves against the
          # helper's manifest dir, not the repo root.
          cargo deny --manifest-path warpgate-rdp-helper/Cargo.toml check --config "$PWD/deny.toml"
          cargo deny --manifest-path warpgate-rdp-server-helper/Cargo.toml check --config "$PWD/deny.toml"
