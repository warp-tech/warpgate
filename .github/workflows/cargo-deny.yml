name: Cargo Deny
permissions:
  contents: read

on: [push, pull_request]

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny@0.18.9

      - name: cargo-deny check
        run: |
          cargo deny --version
          cargo deny check
