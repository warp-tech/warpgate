name: Cargo Deny
permissions:
  contents: read

on: [push, pull_request]

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny@0.18.9

      - name: cargo-deny check
        run: |
          cargo deny --version
          cargo deny check
