name: Cargo Deny
permissions:
  contents: read

on: [push, pull_request]

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny@0.18.9

      - name: cargo-deny check
        run: |
          cargo deny --version
          cargo deny check
