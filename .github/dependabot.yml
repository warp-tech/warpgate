# Please see the documentation for all configuration options:
# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    labels: ["type/deps"]
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    schedule:
      interval: "daily"
    groups:
      version-bumps:
        applies-to: version-updates
        update-types:
          - minor
          - patch
  - package-ecosystem: "npm"
    directory: "/warpgate-web"
    labels: ["type/deps"]
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      version-bumps:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    schedule:
      interval: "daily"

  - package-ecosystem: github-actions
    directory: /
    labels: ["type/deps"]
    schedule:
      interval: daily

  - package-ecosystem: docker
    directory: /docker
    labels: ["type/deps"]
    schedule:
      interval: daily

  - package-ecosystem: pip
    directory: /tests
    labels: ["type/deps"]
    exclude-paths:
      - api_sdk
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    schedule:
      interval: "daily"
    groups:
      version-bumps:
        applies-to: version-updates
        update-types:
          - patch
          - minor
