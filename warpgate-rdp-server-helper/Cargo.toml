[package]
name = "warpgate-rdp-server-helper"
version = "0.23.4"
edition = "2021"
license = "Apache-2.0"
publish = false
description = "Standalone RDP server (viewer-facing) helper for Warpgate, isolated from the workspace lockfile because IronRDP's server/acceptor stack pins picky/sspi pre-releases that conflict with both russh and the RDP client helper."

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
bytes = "1"
ironrdp-server = "0.12.0"
rustls-pemfile = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Own lockfile: must NOT join the Warpgate workspace (picky/sspi pre-release clash).
[workspace]
